<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Wildlife Protection</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="css/favicon.svg" type="image/x-icon">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="species.html">Species</a></li>
            <li><a href="action.html">Take Action</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section id="contact">
        <h2 class="section-title">Get In Touch</h2>
        <p style="font-size: 1.1rem; color: #333; margin-bottom: 20px;">Have questions or want to support wildlife conservation?</p>
        <form id="contactForm" action="https://formsubmit.co/alej10kleon@gmail.com" method="POST">
            <input type="hidden" name="_subject" value="New Wildlife Conservation Contact Form Message">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="cta-button">Send Message</button>
            <p id="statusMessage"></p>
        </form>
    </section>

    <footer id="footer">
        <p>&copy; 2026 Wildlife Conservation Initiative. All rights reserved.</p>
        <p>Dedicated to protecting endangered species and preserving biodiversity for future generations.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const statusMessage = document.getElementById('statusMessage');
            const submitButton = event.target.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Sending...';
            statusMessage.textContent = '';
            const formData = new FormData(this);
            fetch('https://formsubmit.co/alej10kleon@gmail.com', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    statusMessage.textContent = '✓ Message sent successfully!';
                    statusMessage.style.color = '#1abc9c';
                    document.getElementById('contactForm').reset();
                } else {
                    throw new Error('Network response was not ok');
                }
            })
            .catch(error => {
                statusMessage.textContent = '✗ Failed to send message. Please try again.';
                statusMessage.style.color = '#e74c3c';
                console.error('Error:', error);
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.textContent = 'Send Message';
            });
        });
    </script>
</body>
</html>
